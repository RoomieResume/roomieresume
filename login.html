<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoomieResume — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0f2340; --cream: #f5f0e8; --warm: #e8dfd0;
    --gold: #c9a84c; --rust: #c0522a; --green: #1e5631;
    --text: #1a1a1a; --muted: #6b6b6b; --border: #ddd6c8;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  nav {
    background: var(--navy);
    padding: 16px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; color: var(--cream); text-decoration: none; }
  .logo span { color: var(--gold); }

  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }

  .card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 8px 40px rgba(15,35,64,0.08);
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--navy);
    margin-bottom: 6px;
  }

  .card-subtitle {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .tabs {
    display: flex;
    border-bottom: 2px solid var(--border);
    margin-bottom: 28px;
    gap: 0;
  }

  .tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'DM Sans', sans-serif;
  }

  .tab.active {
    color: var(--navy);
    border-bottom-color: var(--navy);
  }

  .form-group {
    margin-bottom: 18px;
  }

  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: 0.02em;
  }

  input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    color: var(--text);
    background: white;
    transition: border-color 0.2s;
  }

  input:focus {
    outline: none;
    border-color: var(--navy);
  }

  .btn {
    width: 100%;
    padding: 13px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .btn-primary {
    background: var(--navy);
    color: var(--cream);
  }

  .btn-primary:hover { background: #1a3560; }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
  }

  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-text { font-size: 0.75rem; color: var(--muted); }

  .error-msg {
    background: rgba(192,82,42,0.1);
    border: 1px solid rgba(192,82,42,0.2);
    color: var(--rust);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.8rem;
    margin-bottom: 16px;
    display: none;
  }

  .success-msg {
    background: rgba(30,86,49,0.1);
    border: 1px solid rgba(30,86,49,0.2);
    color: var(--green);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.8rem;
    margin-bottom: 16px;
    display: none;
  }

  .forgot-link {
    font-size: 0.78rem;
    color: var(--muted);
    text-decoration: none;
    display: block;
    text-align: right;
    margin-top: 6px;
    cursor: pointer;
  }

  .forgot-link:hover { color: var(--navy); }

  .panel { display: none; }
  .panel.active { display: block; }

  .already-logged {
    text-align: center;
    padding: 20px 0;
  }

  .already-logged p {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 16px;
  }

  .already-logged strong {
    color: var(--navy);
  }

  @media (max-width: 480px) {
    .card { padding: 32px 24px; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Roomie<span>Resume</span></a>
</nav>

<div class="main">
  <div class="card">
    <div id="logged-out-view">
      <div class="card-title">Welcome back.</div>
      <div class="card-subtitle">Sign in to manage your profile and connect with roommates.</div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('signin')">Sign In</button>
        <button class="tab" onclick="switchTab('signup')">Create Account</button>
      </div>

      <div id="error-msg" class="error-msg"></div>
      <div id="success-msg" class="success-msg"></div>

      <!-- SIGN IN -->
      <div id="signin-panel" class="panel active">
        <div class="form-group">
          <label>Email address</label>
          <input type="email" id="signin-email" placeholder="you@email.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signin-password" placeholder="Your password">
          <a class="forgot-link" onclick="forgotPassword()">Forgot password?</a>
        </div>
        <button class="btn btn-primary" onclick="signIn()" id="signin-btn">Sign In →</button>
      </div>

      <!-- SIGN UP -->
      <div id="signup-panel" class="panel">
        <div class="form-group">
          <label>Email address</label>
          <input type="email" id="signup-email" placeholder="you@email.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="At least 8 characters">
        </div>
        <div class="form-group">
          <label>Confirm password</label>
          <input type="password" id="signup-confirm" placeholder="Repeat your password">
        </div>
        <button class="btn btn-primary" onclick="signUp()" id="signup-btn">Create Account →</button>
      </div>
    </div>

    <div id="logged-in-view" class="already-logged" style="display:none;">
      <p>You're signed in as <strong id="user-email-display"></strong></p>
      <p style="margin-bottom:16px;font-size:0.82rem;color:var(--muted);">What would you like to do?</p>
      <a href="roomieresume-browse.html" class="btn btn-primary" style="display:block;text-decoration:none;text-align:center;margin-bottom:10px;">Browse Profiles</a>
      <button class="btn" style="background:var(--warm);color:var(--navy);" onclick="signOut()">Sign Out</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut as fbSignOut, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBnZLWnmW2mSwU-DYiHG1zKTUPx5jQ1f4s",
    authDomain: "roomieresume.firebaseapp.com",
    projectId: "roomieresume",
    storageBucket: "roomieresume.firebasestorage.app",
    messagingSenderId: "954670294345",
    appId: "1:954670294345:web:aba84ab600a2e4835b6698"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById('logged-out-view').style.display = 'none';
      document.getElementById('logged-in-view').style.display = 'block';
      document.getElementById('user-email-display').textContent = user.email;
    } else {
      document.getElementById('logged-out-view').style.display = 'block';
      document.getElementById('logged-in-view').style.display = 'none';
    }
  });

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('success-msg').style.display = 'none';
  }

  function showSuccess(msg) {
    const el = document.getElementById('success-msg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('error-msg').style.display = 'none';
  }

  function clearMessages() {
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('success-msg').style.display = 'none';
  }

  window.switchTab = (tab) => {
    clearMessages();
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(tab + '-panel').classList.add('active');
    event.target.classList.add('active');
  };

  window.signIn = async () => {
    clearMessages();
    const email = document.getElementById('signin-email').value.trim();
    const password = document.getElementById('signin-password').value;
    const btn = document.getElementById('signin-btn');

    if (!email || !password) return showError('Please fill in all fields.');

    btn.disabled = true;
    btn.textContent = 'Signing in...';

    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = 'roomieresume-browse.html';
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Sign In →';
      if (err.code === 'auth/invalid-credential') showError('Incorrect email or password.');
      else if (err.code === 'auth/too-many-requests') showError('Too many attempts. Try again later.');
      else showError('Something went wrong. Please try again.');
    }
  };

  window.signUp = async () => {
    clearMessages();
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const confirm = document.getElementById('signup-confirm').value;
    const btn = document.getElementById('signup-btn');

    if (!email || !password || !confirm) return showError('Please fill in all fields.');
    if (password !== confirm) return showError('Passwords do not match.');
    if (password.length < 8) return showError('Password must be at least 8 characters.');

    btn.disabled = true;
    btn.textContent = 'Creating account...';

    try {
      await createUserWithEmailAndPassword(auth, email, password);
      window.location.href = 'roomieresume-browse.html';
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Create Account →';
      if (err.code === 'auth/email-already-in-use') showError('An account with this email already exists.');
      else if (err.code === 'auth/invalid-email') showError('Please enter a valid email address.');
      else showError('Something went wrong. Please try again.');
    }
  };

  window.signOut = async () => {
    await fbSignOut(auth);
  };

  window.forgotPassword = async () => {
    const email = document.getElementById('signin-email').value.trim();
    if (!email) return showError('Enter your email address above first.');
    try {
      await sendPasswordResetEmail(auth, email);
      showSuccess('Password reset email sent — check your inbox.');
    } catch (err) {
      showError('Could not send reset email. Check the address and try again.');
    }
  };
</script>

<!-- ROOMIERESUME AUTH NAV — include this before </body> on every page -->
<style>
  .auth-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--gold); color: var(--navy);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif; font-size: 0.9rem; font-weight: 700;
    cursor: pointer; position: relative; flex-shrink: 0;
    border: 2px solid rgba(201,168,76,0.4);
    transition: transform 0.15s;
  }
  .auth-avatar:hover { transform: scale(1.05); }

  .auth-dropdown {
    position: absolute; top: calc(100% + 10px); right: 0;
    background: white; border: 1px solid var(--border);
    border-radius: 10px; box-shadow: 0 8px 32px rgba(15,35,64,0.12);
    min-width: 200px; padding: 8px 0; z-index: 999;
    display: none;
  }
  .auth-dropdown.open { display: block; }

  .auth-dropdown-header {
    padding: 10px 16px 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .auth-dropdown-email {
    font-size: 0.72rem; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 170px;
  }
  .auth-dropdown-name {
    font-size: 0.82rem; font-weight: 600; color: var(--navy);
    margin-bottom: 2px;
  }

  .auth-dropdown a, .auth-dropdown button {
    display: block; width: 100%; text-align: left;
    padding: 9px 16px; font-size: 0.82rem;
    color: var(--text); text-decoration: none;
    background: none; border: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-weight: 500;
    transition: background 0.15s;
  }
  .auth-dropdown a:hover, .auth-dropdown button:hover {
    background: var(--warm);
  }
  .auth-dropdown .signout-btn {
    color: var(--rust); border-top: 1px solid var(--border);
    margin-top: 4px;
  }

  .auth-wrapper { position: relative; display: flex; align-items: center; }
</style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBnZLWnmW2mSwU-DYiHG1zKTUPx5jQ1f4s",
    authDomain: "roomieresume.firebaseapp.com",
    projectId: "roomieresume",
    storageBucket: "roomieresume.firebasestorage.app",
    messagingSenderId: "954670294345",
    appId: "1:954670294345:web:aba84ab600a2e4835b6698"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Session persistence — logs out when browser/tab is closed
  setPersistence(auth, browserSessionPersistence);

  // Inactivity timeout — 30 minutes
  let inactivityTimer;
  const INACTIVITY_LIMIT = 30 * 60 * 1000;

  function resetTimer() {
    clearTimeout(inactivityTimer);
    inactivityTimer = setTimeout(() => {
      signOut(auth);
      window.location.href = 'login.html';
    }, INACTIVITY_LIMIT);
  }

  ['mousemove','keydown','click','scroll','touchstart'].forEach(e => {
    document.addEventListener(e, resetTimer, { passive: true });
  });

  function getInitial(email) {
    return email ? email[0].toUpperCase() : '?';
  }

  onAuthStateChanged(auth, (user) => {
    const loginBtn = document.getElementById('nav-login-btn');
    if (!loginBtn) return;

    if (user) {
      resetTimer();
      // Replace Sign In button with avatar + dropdown
      const wrapper = document.createElement('div');
      wrapper.className = 'auth-wrapper';
      wrapper.innerHTML = `
        <div class="auth-avatar" id="auth-avatar-btn" title="${user.email}">
          ${getInitial(user.email)}
        </div>
        <div class="auth-dropdown" id="auth-dropdown">
          <div class="auth-dropdown-header">
            <div class="auth-dropdown-name">My Account</div>
            <div class="auth-dropdown-email">${user.email}</div>
          </div>
          <a href="roomieresume-browse.html">Browse Profiles</a>
          <a href="roomieresume-form.html">Edit My Profile</a>
          <button class="signout-btn" id="signout-btn">Sign Out</button>
        </div>
      `;
      loginBtn.replaceWith(wrapper);

      // Toggle dropdown
      document.getElementById('auth-avatar-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        document.getElementById('auth-dropdown').classList.toggle('open');
      });

      // Close dropdown on outside click
      document.addEventListener('click', () => {
        const dd = document.getElementById('auth-dropdown');
        if (dd) dd.classList.remove('open');
      });

      // Sign out
      document.getElementById('signout-btn').addEventListener('click', async () => {
        await signOut(auth);
        window.location.href = 'login.html';
      });

    } else {
      // Not logged in — show Sign In link normally
      loginBtn.style.display = '';
    }
  });
</script>

</body>
</html>
