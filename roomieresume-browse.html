<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoomieResume — Browse Verified Profiles</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0f2340; --cream: #f5f0e8; --warm: #e8dfd0;
    --gold: #c9a84c; --rust: #c0522a; --green: #1e5631;
    --text: #1a1a1a; --muted: #6b6b6b; --border: #ddd6c8;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); }

  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(245,240,232,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 16px 48px; display: flex; justify-content: space-between; align-items: center;
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; color: var(--navy); text-decoration: none; }
  .logo span { color: var(--gold); }
  .nav-right { display: flex; gap: 12px; align-items: center; }
  .nav-btn { padding: 9px 20px; border-radius: 4px; font-size: 0.83rem; font-weight: 600; text-decoration: none; cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; }
  .nav-btn.ghost { background: transparent; color: var(--navy); border: 1.5px solid var(--border); }
  .nav-btn.primary { background: var(--navy); color: var(--cream); }

  .browse-hero { background: var(--navy); padding: 48px 48px 32px; }
  .browse-hero h1 { font-family: 'Playfair Display', serif; font-size: 2.4rem; font-weight: 900; color: var(--cream); margin-bottom: 8px; }
  .browse-hero h1 em { font-style: italic; color: var(--gold); }
  .browse-hero p { color: rgba(245,240,232,0.55); font-size: 0.9rem; margin-bottom: 28px; }

  .stats-bar { display: flex; gap: 32px; }
  .stat { text-align: center; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 900; color: var(--gold); }
  .stat-label { font-size: 0.72rem; color: rgba(245,240,232,0.45); text-transform: uppercase; letter-spacing: 0.1em; }

  .filters-bar { background: white; border-bottom: 1px solid var(--border); padding: 16px 48px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .filter-select { padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; color: var(--text); background: white; cursor: pointer; }
  .filter-select:focus { outline: none; border-color: var(--navy); }
  .filter-clear { padding: 8px 14px; border: none; background: none; font-size: 0.82rem; color: var(--muted); cursor: pointer; text-decoration: underline; }

  .main { max-width: 1200px; margin: 0 auto; padding: 40px 48px 80px; }

  .profiles-count { font-size: 0.82rem; color: var(--muted); margin-bottom: 24px; }

  .profiles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }

  .profile-card {
    background: white; border: 1px solid var(--border); border-radius: 12px;
    padding: 24px; transition: box-shadow 0.2s, transform 0.2s;
    position: relative; overflow: hidden;
  }
  .profile-card:hover { box-shadow: 0 8px 32px rgba(15,35,64,0.1); transform: translateY(-2px); }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
  .avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--navy); display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; color: var(--cream); flex-shrink: 0; }
  .verified-badge { display: flex; align-items: center; gap: 5px; background: rgba(30,86,49,0.1); color: var(--green); font-size: 0.7rem; font-weight: 700; padding: 4px 10px; border-radius: 20px; letter-spacing: 0.05em; }

  .profile-name { font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
  .profile-location { font-size: 0.8rem; color: var(--muted); margin-bottom: 14px; display: flex; align-items: center; gap: 5px; }

  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .tag { font-size: 0.72rem; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
  .tag.seeking { background: rgba(201,168,76,0.15); color: #8a6a1a; }
  .tag.budget { background: rgba(15,35,64,0.08); color: var(--navy); }
  .tag.move { background: rgba(192,82,42,0.1); color: var(--rust); }

  .lifestyle-summary { font-size: 0.8rem; color: var(--muted); line-height: 1.7; margin-bottom: 14px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

  .priorities { display: flex; flex-wrap: wrap; gap: 5px; }
  .priority { font-size: 0.7rem; background: var(--warm); color: var(--navy); padding: 3px 9px; border-radius: 4px; }

  .card-divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

  .empty-state { text-align: center; padding: 80px 24px; }
  .empty-state h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--navy); margin-bottom: 8px; }
  .empty-state p { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; }
  .empty-cta { background: var(--navy); color: var(--cream); padding: 12px 28px; border-radius: 4px; text-decoration: none; font-weight: 600; font-size: 0.88rem; }

  .loading { text-align: center; padding: 80px 24px; }
  .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--navy); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { color: var(--muted); font-size: 0.9rem; }

  .error-state { text-align: center; padding: 60px 24px; }
  .error-state p { color: var(--muted); font-size: 0.9rem; }

  @media (max-width: 768px) {
    nav { padding: 14px 20px; }
    .browse-hero { padding: 32px 20px 24px; }
    .browse-hero h1 { font-size: 1.8rem; }
    .filters-bar { padding: 12px 20px; }
    .main { padding: 28px 20px 60px; }
    .profiles-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Roomie<span>Resume</span></a>
  <div class="nav-right">
    <a href="roomieresume-form.html" class="nav-btn ghost">Create Profile</a>
    <a href="roomieresume-form.html" class="nav-btn primary">Get Verified →</a>
  </div>
</nav>

<div class="browse-hero">
  <h1>Browse <em>verified</em> profiles.</h1>
  <p>Every profile is reference-checked and personally reviewed before going live.</p>
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-num" id="total-count">—</div>
      <div class="stat-label">Verified Profiles</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="seeking-room-count">—</div>
      <div class="stat-label">Seeking Room</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="have-room-count">—</div>
      <div class="stat-label">Have a Room</div>
    </div>
  </div>
</div>

<div class="filters-bar">
  <select class="filter-select" id="filter-seeking" onchange="applyFilters()">
    <option value="">All Types</option>
    <option value="need-room">Seeking a Room</option>
    <option value="have-room">Have a Room</option>
    <option value="either">Either / Flexible</option>
  </select>
  <select class="filter-select" id="filter-budget" onchange="applyFilters()">
    <option value="">Any Budget</option>
    <option value="Under $600">Under $600</option>
    <option value="$600–$900">$600–$900</option>
    <option value="$900–$1,200">$900–$1,200</option>
    <option value="$1,200–$1,600">$1,200–$1,600</option>
    <option value="$1,600+">$1,600+</option>
  </select>
  <select class="filter-select" id="filter-move" onchange="applyFilters()">
    <option value="">Any Timeline</option>
    <option value="Within 1 month">Within 1 month</option>
    <option value="1–3 months">1–3 months</option>
    <option value="3–6 months">3–6 months</option>
  </select>
  <button class="filter-clear" onclick="clearFilters()">Clear filters</button>
</div>

<div class="main">
  <div class="profiles-count" id="profiles-count"></div>
  <div id="profiles-container">
    <div class="loading">
      <div class="loading-spinner"></div>
      <p>Loading verified profiles...</p>
    </div>
  </div>
</div>

<script>
  const SHEET_ID = '1LaX3ogUTQmBOE89f0fbaAxZc0Ro-BD1FmaWYWcff-OQ';
  const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Public&gid=940284971`;

  let allProfiles = [];

  function seekingLabel(val) {
    if (!val) return '';
    if (val.includes('need') || val === 'need-room') return 'Seeking a Room';
    if (val.includes('have') || val === 'have-room') return 'Has a Room';
    return 'Either / Flexible';
  }

  function seekingTagClass(val) {
    return 'seeking';
  }

  function initials(name) {
    if (!name) return '?';
    const parts = name.trim().split(' ');
    return parts.map(p => p[0]).join('').toUpperCase().slice(0, 2);
  }

  function renderProfiles(profiles) {
    const container = document.getElementById('profiles-container');
    const countEl = document.getElementById('profiles-count');

    if (profiles.length === 0) {
      countEl.textContent = '';
      container.innerHTML = `
        <div class="empty-state">
          <h2>No profiles match your filters</h2>
          <p>Try adjusting your filters or check back soon — new profiles are added regularly.</p>
          <a href="roomieresume-form.html" class="empty-cta">Be the first →</a>
        </div>`;
      return;
    }

    countEl.textContent = `Showing ${profiles.length} verified profile${profiles.length !== 1 ? 's' : ''}`;

    container.innerHTML = `<div class="profiles-grid">${profiles.map(p => {
      const name = p.name || 'Anonymous';
      const location = p.location || 'Location not specified';
      const seeking = p.seeking || '';
      const budget = p.budget || '';
      const moveTimeline = p.move_timeline || '';
      const lifestyle = p.lifestyle_summary || '';
      const priorities = p.priorities ? p.priorities.split(',').map(x => x.trim()).filter(Boolean) : [];

      return `
        <div class="profile-card">
          <div class="card-top">
            <div class="avatar">${initials(name)}</div>
            <div class="verified-badge">✓ Verified</div>
          </div>
          <div class="profile-name">${name}</div>
          <div class="profile-location">📍 ${location}</div>
          <div class="tags">
            ${seeking ? `<span class="tag seeking">${seekingLabel(seeking)}</span>` : ''}
            ${budget ? `<span class="tag budget">${budget}/mo</span>` : ''}
            ${moveTimeline ? `<span class="tag move">${moveTimeline}</span>` : ''}
          </div>
          ${lifestyle ? `<div class="lifestyle-summary">${lifestyle}</div>` : ''}
          ${priorities.length > 0 ? `
            <hr class="card-divider">
            <div class="priorities">
              ${priorities.slice(0, 4).map(p => `<span class="priority">${p}</span>`).join('')}
            </div>` : ''}
        </div>`;
    }).join('')}</div>`;
  }

  function applyFilters() {
    const seeking = document.getElementById('filter-seeking').value;
    const budget = document.getElementById('filter-budget').value;
    const move = document.getElementById('filter-move').value;

    let filtered = allProfiles.filter(p => {
      if (seeking && p.seeking !== seeking) return false;
      if (budget && p.budget !== budget) return false;
      if (move && p.move_timeline !== move) return false;
      return true;
    });

    renderProfiles(filtered);
  }

  function clearFilters() {
    document.getElementById('filter-seeking').value = '';
    document.getElementById('filter-budget').value = '';
    document.getElementById('filter-move').value = '';
    renderProfiles(allProfiles);
  }

  function updateStats(profiles) {
    document.getElementById('total-count').textContent = profiles.length;
    document.getElementById('seeking-room-count').textContent = profiles.filter(p => p.seeking === 'need-room').length;
    document.getElementById('have-room-count').textContent = profiles.filter(p => p.seeking === 'have-room').length;
  }

  async function loadProfiles() {
    try {
      const res = await fetch(SHEET_URL);
      const text = await res.text();
      const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);/)[1]);

      const rows = json.table.rows;
      const cols = json.table.cols.map(c => c.label.toLowerCase().replace(/ /g, '_'));

      const profiles = rows
        .map(row => {
          const obj = {};
          cols.forEach((col, i) => {
            obj[col] = row.c[i] ? (row.c[i].v !== null ? String(row.c[i].v) : '') : '';
          });
          return obj;
        })
        .filter(p => p.name && p.name.trim() !== '');

      allProfiles = profiles;
      updateStats(profiles);

      if (profiles.length === 0) {
        document.getElementById('profiles-container').innerHTML = `
          <div class="empty-state">
            <h2>No verified profiles yet</h2>
            <p>Be one of our founding members — submit your profile and get verified.</p>
            <a href="roomieresume-form.html" class="empty-cta">Create Your Profile →</a>
          </div>`;
        document.getElementById('total-count').textContent = '0';
        document.getElementById('seeking-room-count').textContent = '0';
        document.getElementById('have-room-count').textContent = '0';
        return;
      }

      renderProfiles(profiles);

    } catch (err) {
      console.error(err);
      document.getElementById('profiles-container').innerHTML = `
        <div class="error-state">
          <p>Couldn't load profiles right now. Please refresh the page or try again shortly.</p>
        </div>`;
    }
  }

  loadProfiles();
</script>

</body>
</html>
